<div class="bg-white/60 dark:bg-gray-800/60 backdrop-blur-xl rounded-2xl p-6 border border-gray-200/50 dark:border-gray-700/50 shadow-xl space-y-4">
  <h3 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Simulador de Apostas Passadas</h3>

  <div class="space-y-2">
    <label for="game-type" class="label-base text-gray-700 dark:text-gray-300">
      Tipo de jogo
    </label>
    <select
      id="game-type"
      class="select-base bg-white/80 dark:bg-gray-900/80"
      [value]="selectedGame"
      (change)="onGameChange($event)"
    >
      <option value="">Selecione um jogo</option>
      <option *ngFor="let game of gameOptions" [value]="game">{{ getGameLabel(game) }}</option>
    </select>
  </div>

  <p class="text-sm text-gray-600 dark:text-gray-400">
    Selecione um jogo para iniciar a simulacao.
  </p>
</div>
